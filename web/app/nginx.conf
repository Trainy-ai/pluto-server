server {
    listen       3000;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    location /trpc {
        proxy_pass http://backend:3001/trpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location ~ ^/api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # Static assets (JS, CSS, images, fonts) — return 404 if missing.
    # Prevents serving index.html with wrong MIME type for stale hashed filenames.
    location /assets/ {
        try_files $uri =404;
    }

    # SPA fallback — all other routes serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
