# Pinned frontend version → which index.html to serve.
# The cookie (set by the in-app version switcher / a `?fe=` link) names a
# release whose entry document lives at /v/<version>/index.html. The image
# bakes in the last N releases side-by-side; their content-hashed assets are
# all merged into /assets/, so only the entry document differs per version.
# No cookie → latest build at /index.html. The charset is restricted and `..`
# is rejected (mirrors isValidVersion in src/lib/frontend-version.ts) so the
# cookie can't be used for path traversal; an unknown version simply falls
# through to latest below.
map $cookie_mlop_fe_version $fe_index {
    default                          /index.html;
    "~^(?!.*\.\.)[A-Za-z0-9._-]+$"   /v/$cookie_mlop_fe_version/index.html;
}

server {
    listen       3000;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Enable gzip for proxied API responses (tRPC JSON payloads can be 5+ MB)
    gzip on;
    gzip_proxied any;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 1;

    location /trpc {
        proxy_pass http://backend:3001/trpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Buffer backend response so gzip compresses efficiently in one pass
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 32 128k;
        proxy_busy_buffers_size 256k;
    }

    location ~ ^/api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    # Static assets (JS, CSS, images, fonts) — return 404 if missing.
    # Prevents serving index.html with wrong MIME type for stale hashed filenames.
    location /assets/ {
        try_files $uri =404;
    }

    # Root must be an exact match: otherwise `try_files $uri` treats "/" as a
    # directory and the `index` directive serves the latest index.html before
    # $fe_index is consulted, ignoring a pinned cookie on the landing page.
    location = / {
        try_files $fe_index /index.html;
    }

    # SPA fallback — all other routes serve the pinned version's index.html
    # (or the latest build's index.html when unpinned / pinned version missing)
    # for client-side routing.
    location / {
        try_files $uri $fe_index /index.html;
    }
}
